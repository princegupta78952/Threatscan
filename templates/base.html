<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreatScan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            width: 280px;
            height: 100vh;
            background-color: #161b22;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: fixed;
            top: 0;
            left: 0;
            overflow-y: auto;
        }
        .main-content {
            margin-left: 280px;
            height: 100vh;
            overflow-y: auto;
            padding: 40px;
            width: calc(100% - 280px);
        }
        .history-item {
            display: block;
            padding: 10px 15px;
            margin-bottom: 5px;
            border-radius: 6px;
            color: #8b949e;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-item:hover {
            background-color: #21262d;
            color: #fff;
        }
        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .dot-safe { background-color: #2ea043; box-shadow: 0 0 5px #2ea043; }
        .dot-danger { background-color: #da3633; box-shadow: 0 0 5px #da3633; }
        .dot-warning { background-color: #d29922; box-shadow: 0 0 5px #d29922; }
        
        .form-control {
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: white;
        }
        .form-control:focus {
            background-color: #0d1117;
            color: white;
            border-color: #58a6ff;
            box-shadow: 0 0 0 0.25rem rgba(88, 166, 255, 0.25);
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0d1117;
        }
        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #8b949e;
        }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
