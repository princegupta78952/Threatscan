<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreatScan AI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            color: #212529;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            height: 100vh;
            background-color: #ffffff;
            border-right: 1px solid #e9ecef;
            box-shadow: 2px 0 15px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            padding: 24px;
            position: fixed;
            top: 0;
            left: 0;
            overflow-y: auto;
            z-index: 1000;
        }

        .sidebar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0d6efd;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .main-content {
            margin-left: 280px;
            height: 100vh;
            overflow-y: auto;
            padding: 50px;
            width: calc(100% - 280px);
            background-color: #f8f9fa;
        }

        .history-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 600;
            color: #6c757d;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            margin-top: 10px;
        }

        .history-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            color: #495057;
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.2s ease-in-out;
            border: 1px solid transparent;
        }

        .history-item:hover {
            background-color: #f1f3f5;
            color: #212529;
            border-color: #e9ecef;
            transform: translateX(3px);
        }

        .status-dot {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 12px;
            flex-shrink: 0;
        }
        
        .dot-safe { background-color: #198754; }
        .dot-danger { background-color: #dc3545; }
        .dot-warning { background-color: #ffc107; }
        
        .history-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .form-control {
            background-color: #ffffff;
            border: 1px solid #ced4da;
            color: #212529;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.01);
        }
        
        .form-control:focus {
            background-color: #ffffff;
            color: #212529;
            border-color: #86b7fe;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .btn-primary {
            box-shadow: 0 4px 6px rgba(13, 110, 253, 0.2);
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 8px rgba(13, 110, 253, 0.25);
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f3f5;
        }
        ::-webkit-scrollbar-thumb {
            background: #adb5bd;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6c757d;
        }
        
        .logout-btn-container {
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid #e9ecef;
        }
    </style>
</head>
<body>

    {% block content %}{% endblock %}
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
